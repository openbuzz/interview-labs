# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

silent: true

vars:
  TF_BIN:
    sh: command -v terraform >/dev/null 2>&1 && echo terraform || echo tofu

tasks:
  default:
    cmd: task --list

  check:
    desc: Verify required host tools are present
    cmd: |
      set -e -u -o pipefail

      echo "=> Checking host tools"
      missing=0
      for tool in bats docker go golangci-lint hadolint jq shellcheck shfmt task tflint trivy; do
        if command -v "${tool}" >/dev/null 2>&1; then
          echo "   ✓ ${tool}"
        else
          echo "   ✗ ${tool} not found"
          missing=1
        fi
      done
      if command -v terraform >/dev/null 2>&1; then
        echo "   ✓ terraform"
      elif command -v tofu >/dev/null 2>&1; then
        echo "   ✓ tofu"
      else
        echo "   ✗ terraform or tofu not found"
        missing=1
      fi

      [[ "${missing}" -eq 0 ]] || exit 1
      echo "=> ✓ All host tools present"

  lint:
    desc: Lint everything (go + terraform + docker stack)
    cmds:
      - task: go:lint
      - task: tf:fmt
      - task: tf:lint
      - task: docker:lint

  build:
    desc: Build the interview binary
    cmds:
      - task: go:build

  test:
    desc: Run the Go test suite
    cmds:
      - task: go:test

  scan:
    desc: Scan terraform for misconfigurations
    cmds:
      - task: tf:scan

  test:tui:
    desc: TUI golden frames — tmux + bats in docker
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ tui tests failed"' ERR

      echo "=> Building tui image"
      docker build -f tests/tui/Dockerfile -t interview-labs-tui .
      echo "=> Running tui tests"
      docker run --rm --network=none interview-labs-tui
      echo "=> ✓ tui tests passed"

  test:tui:update:
    desc: Regenerate the TUI goldens (rewrites tests/tui/snapshots)
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ tui golden update failed"' ERR

      echo "=> Building tui image"
      docker build -f tests/tui/Dockerfile -t interview-labs-tui .
      echo "=> Updating goldens"
      docker run --rm --network=none -e UPDATE_GOLDENS=1 \
        -v "$(pwd)/tests/tui/snapshots:/src/tests/tui/snapshots" interview-labs-tui
      echo "=> ✓ goldens updated"

  go:lint:
    desc: gofmt, go vet, golangci-lint over the module
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ go lint failed"' ERR

      echo "=> Linting go module"
      if [[ -n "$(gofmt -l .)" ]]; then
        echo "   gofmt needs:"
        gofmt -l .
        exit 1
      fi
      go vet ./...
      golangci-lint run ./...
      echo "=> ✓ go lint clean"

  go:build:
    desc: Build bin/interview
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ go build failed"' ERR

      echo "=> Building interview binary"
      go build -o bin/interview ./cmd/interview
      echo "   binary: bin/interview"
      echo "=> ✓ interview binary built"

  go:test:
    desc: Run go tests
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ go test failed"' ERR

      echo "=> Testing go module"
      go test ./...
      echo "=> ✓ go tests passed"

  tf:fmt:
    desc: Check terraform formatting
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ terraform fmt failed"' ERR

      echo "=> Checking terraform formatting ({{.TF_BIN}})"
      "{{.TF_BIN}}" fmt -check -recursive terraform
      echo "=> ✓ terraform formatting clean"

  tf:lint:
    desc: tflint over the terraform tree
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ tflint failed"' ERR

      echo "=> Linting terraform"
      (cd terraform && tflint --recursive)
      echo "=> ✓ tflint clean"

  tf:scan:
    desc: trivy config scan, findings fail the task
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ trivy scan failed"' ERR

      echo "=> Scanning terraform (trivy)"
      trivy config --exit-code 1 terraform
      echo "=> Scanning docker stack (trivy)"
      trivy config --exit-code 1 --ignorefile .trivyignore.yaml docker
      echo "=> ✓ trivy clean"

  docker:lint:
    desc: hadolint, shellcheck, shfmt and gateway go lint over docker/
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ docker lint failed"' ERR

      echo "=> Linting docker stack"
      (cd docker/images/gateway && hadolint Dockerfile)
      (cd docker/images/vscode && hadolint layers/*/Dockerfile)
      shellcheck docker/images/vscode/layers/base/files/entrypoint.sh \
        docker/images/vscode/layers/base/files/bin/* \
        docker/images/vscode/layers/*/setup.sh
      shfmt -d docker/images/vscode/layers/base/files/entrypoint.sh \
        docker/images/vscode/layers/base/files/bin/* \
        docker/images/vscode/layers/*/setup.sh
      (
        cd docker/images/gateway
        if [[ -n "$(gofmt -l .)" ]]; then
          echo "   gofmt needs:"
          gofmt -l .
          exit 1
        fi
        go vet ./...
        golangci-lint run ./...
      )
      echo "=> ✓ docker lint clean"

  docker:build:
    desc: Build the stack images via docker bake (dev loop; the VM pulls prebuilt images)
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ docker build failed"' ERR

      echo "=> Building stack images via bake"
      (cd docker && TAG=local docker buildx bake -f docker-bake.hcl local gateway \
        --set '*.output=type=docker')
      echo "=> ✓ stack images built"

  docker:test:
    desc: Gateway go tests + smoke, then per-layer bats against built images
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ docker tests failed"' ERR

      echo "=> Testing gateway"
      (cd docker/images/gateway && go test -cover ./... && bats tests/smoke.bats)

      echo "=> Testing vscode layers"
      targets="$(cd docker && TAG=local docker buildx bake -f docker-bake.hcl local --print \
        | jq -r '.target | keys[]')"
      if [[ -z "${targets}" ]]; then
        echo "=> ✗ no bake targets discovered"
        exit 1
      fi
      for t in ${targets}; do
        echo "=> Running ${t} suite"
        if [[ "${t}" == *-ai ]]; then
          (cd docker/images/vscode &&
            IMAGE="interview-labs-vscode:${t}-local" AI_PARENT="${t%-ai}" bats tests/ai/)
        else
          (cd docker/images/vscode &&
            IMAGE="interview-labs-vscode:${t}-local" bats "tests/${t}/")
        fi
      done
      echo "=> ✓ docker tests passed"

  docker:e2e:
    desc: Full-stack end-to-end — gateway auth + proxy against real code-server
    cmd: |
      set -e -u -o pipefail
      trap 'echo "=> ✗ docker e2e failed"' ERR

      echo "=> Running stack e2e"
      GATEWAY_PASSWORD="${GATEWAY_PASSWORD:-openbuzz}" VSCODE_PROFILE=devops \
        bats tests/e2e.bats
      echo "=> ✓ stack e2e passed"
