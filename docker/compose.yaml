name: interview-labs
services:
  gateway:
    container_name: ${COMPOSE_PROJECT_NAME}-gateway
    image: ${GATEWAY_IMAGE:-ghcr.io/openbuzz/interview-labs-gateway:edge}
    environment:
      GATEWAY_PASSWORD: ${GATEWAY_PASSWORD}
      GATEWAY_LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-info}
    ports:
      - '${GATEWAY_BIND:-127.0.0.1:8080}:8080'
    depends_on:
      vscode:
        condition: service_healthy
  vscode:
    container_name: ${COMPOSE_PROJECT_NAME}-vscode
    image: ${VSCODE_IMAGE:-ghcr.io/openbuzz/interview-labs-vscode:edge-devops}
    environment:
      DOCKER_HOST: tcp://dind:2375
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${OPENROUTER_API_KEY:-}
    depends_on:
      dind:
        condition: service_healthy
  dind:
    container_name: ${COMPOSE_PROJECT_NAME}-dind
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ''
    command: ['--tls=false']
    healthcheck:
      test: ['CMD', 'docker', 'info']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
